<!DOCTYPE html>
<html>
<head>
    <title>Bulk Certificate Generator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        input, button {
            margin: 10px;
            padding: 10px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

<h1>🎓 Bulk Certificate Generator</h1>

<div class="container">

<form action="/generate" method="post" enctype="multipart/form-data">

    <p><b>Upload CSV File</b></p>
    <input type="file" name="file" required>

    <p><b>Upload Certificate Template</b></p>
    <input type="file" name="template" required>

    <p><b>Adjust Name Position (X-axis)</b></p>
    <input type="number" name="x" value="650">

    <p><b>Adjust Name Position (Y-axis)</b></p>
    <input type="number" name="y" value="650">

    <button>Generate Certificates</button>

</form>

</div>

</body>
</html>
